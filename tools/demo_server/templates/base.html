<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}AutoTarefas Demo{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <header>
      <div class="container">
        <h1><a href="{{ url_for('index') }}">AutoTarefas Demo</a></h1>
        <p class="subtitle">
          Sistema de cadastro fake — apenas para testes de RPA
        </p>
      </div>
    </header>

    <main class="container">{% block content %}{% endblock %}</main>

    <footer>
      <div class="container">
        <p>
          Servidor demo do AutoTarefas •
          <a href="{{ url_for('cadastros_json') }}">Ver dados (JSON)</a>
        </p>
      </div>
    </footer>
  </body>
</html>
